name: 自动打包并部署carinfo到GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 🔴 固定 pnpm 版本为 8.5.1（无构建脚本拦截，完美兼容）
      - name: 安装pnpm包管理器
        uses: pnpm/action-setup@v3
        with:
          version: 8.5.1
          run_install: false

      - name: 安装Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          check-latest: true
          cache: 'pnpm'

      - name: 配置pnpm国内镜像源
        run: pnpm config set registry https://registry.npmmirror.com

      - name: 验证pnpm/node版本
        run: |
          node -v
          pnpm -v

      # 直接安装依赖，无任何额外批准命令
      - name: 安装项目依赖
        run: pnpm install

      - name: 打包项目（适配GitHub Pages）
        run: pnpm run build:github

      - name: 创建.nojekyll文件
        run: touch dist/.nojekyll

      - name: 部署到GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
